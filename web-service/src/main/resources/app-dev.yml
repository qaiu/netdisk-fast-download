# 服务配置
server:
  port: 6400
  contextPath: /
  # 使用数据库
  enableDatabase: true
  # 服务域名或者IP 生成二维码链接时需要，不设置则自动从请求地址获取
#  domainName: http://127.0.0.1:6401
  # 预览服务URL
  previewURL: https://nfd-parser.github.io/nfd-preview/preview.html?src=
  # auth参数加密密钥（16位AES密钥）
  authEncryptKey: 'nfd_auth_key2026'

# 反向代理服务器配置路径(不用加后缀)
proxyConf: server-proxy

# JS演练场配置
playground:
  # 是否启用演练场，默认false不启用
  enabled: false
  # 公开模式，默认false需要密码访问，设为true则无需密码
  public: false
  # 访问密码，建议修改默认密码！
  password: 'nfd_playground_2024'

# vertx核心线程配置(一般无需改的), 为0表示eventLoopPoolSize将会采用默认配置(CPU核心*2) workerPoolSize将会采用默认20
vertx:
  eventLoopPoolSize: 0
  workerPoolSize: 0

# vertx-service配置(一般无需改的)
custom:
  # 异步服务线程数
  asyncServiceInstances: 4
  # server路由(controller层)所在包路径
  baseLocations: cn.qaiu.lz
  # 路由处理默认超时时间(毫秒)
  routeTimeOut: 15000
  # 拦截器匹配规则
  ignoresReg:
    # - /v2/statisticsInfo
    - .*/test.*$

  # 参数注入的实体类包路径匹配正则 (防止同名类引发歧义)
  entityPackagesReg:
    - ^cn\.qaiu\.lz\.web\.model\..*

# 限流配置
#rateLimit:
#  # 是否启用限流
#  enable: true
#  # 限流的请求数
#  limit: 10
#  # 限流的时间窗口(单位秒)
#  timeWindow: 10
#  # 路径匹配规则
#  pathReg: ^/v2/.*


# 数据源配置
dataSource:
  # PGSQL配置示例
  #jdbcUrl: jdbc:postgresql://localhost:5432/zzzmy
  # MySQL配置示例
  #jdbcUrl: jdbc:mysql://127.0.0.1:3306/nfddata?useUnicode=true&characterEncoding=utf-8&allowMultiQueries=true&serverTimezone=GMT%2B8&useSSL=false
  # 内置数据源H2db配置
  jdbcUrl: jdbc:h2:file:./db/nfdData;MODE=MySQL;DATABASE_TO_UPPER=FALSE
  username: root
  password: '123456'

# 直链缓存相关配置
cache:
  # 该配置未使用，后续加入其他Cache实现时，区分类型
  type: h2db
  # 默认时长: 单位分钟，大部分网盘未严格验证，建议不要太大
  defaultDuration: 5
  # 具体网盘的缓存配置（单位：分钟）
  # - 配置 key 且有值（如 le: 2879）：使用指定时长
  # - 配置 key 但无值（如 fc:）：使用上面的 defaultDuration
  # - 未配置的 key：不缓存，每次都请求网盘API
  # 格式：网盘标识: 时长
  duration:
    # ---- 网盘类 ----
    ce: 5                # Cloudreve
    cow: 5               # 奶牛快传
    ct: 30               # 城通网盘
    ec: 5                # 移动云空间
    fc:                  # 亿方云
    fj: 20               # 小飞机网盘 链接有效期约30分钟
    fs:                  # 飞书云盘
    iz: 20               # 蓝奏云优享 链接有效期约30分钟
    kd:                  # 可道云
    le: 2879             # 联想乐云
    lz: 30               # 蓝奏云 链接有效期约45分钟
    other:               # 其他网盘
    p115: 30             # 115网盘
    pdb:                 # Dropbox
    pcx:                 # 超星云盘（需要 referer 头）
    pgd:                 # Google Drive
    pic:                 # iCloud
    pod:                 # OneDrive
    pvyy:                # 微雨云存储
    pwps:                # WPS云文档
    qk:                  # 夸克网盘
    qq: 9999999          # QQ邮箱中转站 (iwx.mail.qq.com/ftn/download)
    qqsc:                # QQ闪传 (qfile.qq.com)
    qqw: 30              # QQ邮箱云盘 (wx.mail.qq.com/s)
    uc:                  # UC网盘
    ws: 10               # 文叔叔
    ye: -1               # 123网盘

    # ---- 音乐类 ----
    baidu_photo: 5       # 百度网盘相册
    migu: 5              # 咪咕音乐
    mkg: 30              # 酷狗音乐
    mkgs:                # 酷狗音乐分享短链
    mkgs2:               # 酷狗音乐分享2（share/*.html）
    mkws:                # 酷我音乐分享
    mmgs:                # 咪咕音乐分享短链
    mne: 30              # 网易云音乐
    mnes:                # 网易云音乐分享短链
    mqq: 30              # QQ音乐
    mqqs:                # QQ音乐分享短链
    qishui_music: 5      # 汽水音乐

# httpClient静态代理服务器配置(外网代理)
proxy:
#  - panTypes: pgd,pdb,pod
#    type: http # 支持http/socks4/socks5
#    host: 127.0.0.1
#    port: 7890
#    username:
#    password:

### 解析认证相关
auths:
  # 123网盘：配置用户名密码
  ye:
    username:
    password:
