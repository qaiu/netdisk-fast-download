# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI（Maven 构建 + Docker 镜像 + 原生环境打包）

# The API requires write permission on the repository to submit dependencies
permissions:
  contents: write
  packages: write

on:
  push:
    tags:
      - '*'  # 只有推送tag时才会触发构建
    branches-ignore:
      - '*'  # 排除所有分支的提交
    paths-ignore:
      - 'bin/**'
      - '.github/**'
      - '.mvn/**'
      - '.run/**'
      - '.vscode/**'
      - '*.txt'
      - '*.md'
  pull_request:
    branches:
      - "main"

jobs:
  build:
    name: 构建 + Docker 镜像
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v3

    - name: 设置 Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: 设置 JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: 构建前端
      run: cd web-front && yarn install && yarn run build

    - name: Maven 编译打包
      run: mvn -B package -DskipTests --file pom.xml

    # Optional: Uploads the full dependency graph to GitHub to improve the quality of Dependabot alerts this repository can receive
    - name: 更新依赖图谱
      uses: advanced-security/maven-dependency-submission-action@v3
      if: github.event_name != 'pull_request'
      continue-on-error: true
      with:
        ignore-maven-wrapper: true

#    - uses: release-drafter/release-drafter@v5
#      env:
#        GITHUB_TOKEN: ${{ secrets.ACCESS_TOKEN }}

    - name: 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        path: web-service/target/netdisk-fast-download-bin.zip

    - name: 登录 GitHub 容器仓库
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: 设置 Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: 提取 Git 标签
      id: tag
      run: |
        GIT_TAG=$(git tag --points-at HEAD | head -n 1)
        echo "tag=$GIT_TAG" >> $GITHUB_OUTPUT

    - name: 构建并推送 Docker 镜像
      if: github.event_name != 'pull_request'
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        platforms: linux/amd64,linux/arm64,linux/arm/v7
        tags: |
          ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.tag }}
          ghcr.io/${{ github.repository }}:latest

  # 原生环境打包 (Linux / Windows)，内置精简 JRE，解压即用
  native-package:
    name: 原生环境打包 → ${{ matrix.artifact-name }}
    needs: build
    if: github.event_name != 'pull_request'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact-name: netdisk-fast-download-linux-amd64
          - os: windows-latest
            artifact-name: netdisk-fast-download-windows-amd64
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    steps:
    - name: 检出代码
      uses: actions/checkout@v3

    - name: 设置 Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: 设置 JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # ============================================================
    # Step 1: 构建项目
    # ============================================================
    - name: 构建前端
      run: cd web-front && yarn install && yarn run build

    - name: Maven 编译打包
      run: mvn -B package -DskipTests --file pom.xml

    # ============================================================
    # Step 2: jdeps 分析 → 确定所需 JDK 模块
    # ============================================================
    - name: 分析所需 JDK 模块（jdeps）
      run: |
        MAIN_JAR="web-service/target/package/netdisk-fast-download.jar"
        LIB_DIR="web-service/target/package/lib"

        # 拼接 classpath
        CP=""
        for jar in "$LIB_DIR"/*.jar; do
          CP="$CP${CP:+:}$jar"
        done

        # 用 jdeps 分析模块依赖
        RAW_MODULES=$(jdeps --print-module-deps --multi-release 17 \
          --class-path "$CP" "$MAIN_JAR" 2>/dev/null || true)

        # 如果 jdeps 分析失败，使用安全回退集合
        if [ -z "$RAW_MODULES" ]; then
          RAW_MODULES="java.base,java.logging,java.sql,java.naming,java.management,java.xml,jdk.unsupported,java.net.http,java.instrument,java.security.jgss,java.security.sasl"
          echo "jdeps 分析失败，使用回退模块列表"
        fi

        echo "detected modules: $RAW_MODULES"
        echo "JDK_MODULES=$RAW_MODULES" >> $GITHUB_ENV

    # ============================================================
    # Step 3: jlink 生成精简 JRE
    # ============================================================
    - name: 生成精简 JRE（jlink）
      run: |
        echo "JAVA_HOME=$JAVA_HOME"
        echo "modules=$JDK_MODULES"

        jlink \
          --module-path "$JAVA_HOME/jmods" \
          --add-modules "$JDK_MODULES" \
          --output "native-package/netdisk-fast-download/jre" \
          --strip-debug \
          --compress=2 \
          --no-header-files \
          --no-man-pages

        # 打印 JRE 大小
        echo "JRE size:"
        du -sh native-package/netdisk-fast-download/jre || true

    # ============================================================
    # Step 4: 组装包目录（和现有 zip 同结构，仅多一个 jre/）
    # ============================================================
    - name: 组装包目录
      run: |
        PKG="native-package/netdisk-fast-download"
        SRC="web-service/target/package"

        # 拷贝应用文件
        cp "$SRC/netdisk-fast-download.jar" "$PKG/"
        cp -r "$SRC/lib"         "$PKG/"
        cp -r "$SRC/resources"   "$PKG/"
        cp -r "$SRC/webroot"     "$PKG/"

        # 创建运行时目录
        mkdir -p "$PKG/db"
        mkdir -p "$PKG/logs"

    # ============================================================
    # Step 5: 生成启动脚本
    # ============================================================
    - name: 生成启动脚本（Linux）
      run: |
        PKG="native-package/netdisk-fast-download"

        cat > "$PKG/run.sh" << 'SCRIPT'
        #!/bin/bash
        DIR="$(cd "$(dirname "$0")" && pwd)"
        exec "$DIR/jre/bin/java" -Xmx512M -Dfile.encoding=utf-8 -jar "$DIR/netdisk-fast-download.jar" "$@"
        SCRIPT

        chmod +x "$PKG/run.sh"

    - name: 生成启动脚本（Windows）
      run: |
        PKG="native-package/netdisk-fast-download"

        cat > "$PKG/run.bat" << 'SCRIPT'
        @echo off
        chcp 65001 > nul
        pushd %~dp0
        "%~dp0jre\bin\java.exe" -Xmx512M -Dfile.encoding=utf-8 -jar "%~dp0netdisk-fast-download.jar" %*
        SCRIPT

    # ============================================================
    # Step 6: 打包为 zip
    # ============================================================
    - name: 打包 ZIP（Linux）
      if: runner.os == 'Linux'
      run: |
        cd native-package
        zip -r "../${{ matrix.artifact-name }}.zip" netdisk-fast-download/

    - name: 打包 ZIP（Windows）
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        Compress-Archive -Path native-package/netdisk-fast-download/* -DestinationPath "${{ matrix.artifact-name }}.zip"

    # ============================================================
    # Step 7: 上传产物
    # ============================================================
    - name: 上传原生安装包
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact-name }}
        path: ${{ matrix.artifact-name }}.zip
